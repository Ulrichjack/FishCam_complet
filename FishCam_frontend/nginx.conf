# ─── SKELETON: nginx.conf (Frontend Angular) ───────────────────────────

server {
    # DIRECTIVE: Écoute sur le port 80
    # YOUR CODE HERE
    listen 80;
    
    server_name localhost;

    # DIRECTIVE: Définis le dossier racine où se trouvent les fichiers Angular
    # (C'est le dossier où on a copié les fichiers dans le Dockerfile : /usr/share/nginx/html)
    # YOUR CODE HERE
    root /usr/share/nginx/html;
    
    # DIRECTIVE: Définis le fichier par défaut à charger (index.html)
    # YOUR CODE HERE
    index index.html;

    # ─── RÈGLE 1 : API PROXY (Backend) ───
    location /api/ {
        # DIRECTIVE: Redirige toutes les requêtes qui commencent par /api/ vers le backend.
        # Le nom du container backend sera 'fishcam-backend' et il écoute sur le port 8080.
        # (C'est la réponse à la question flash !)
        # YOUR CODE HERE
        proxy_pass http://fishcam-backend:8080;
        
        # Ces lignes transmettent les vraies adresses IP au backend (ne les modifie pas)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── RÈGLE 2 : ANGULAR SPA ROUTING ───
    location / {
        # DIRECTIVE: Essaie de trouver le fichier demandé, sinon renvoie index.html
        # (C'est la réponse à la question flash 14.2 d'hier !)
        # YOUR CODE HERE
        try_files $uri $uri/ /index.html;
    }
}