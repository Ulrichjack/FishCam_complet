<div class="flex h-screen overflow-hidden bg-fc-bg font-sans">

  <!-- Desktop sidebar -->
  <div class="hidden lg:fixed lg:inset-y-0 lg:left-0 lg:z-50 lg:block lg:w-64">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Mobile overlay + drawer -->
  @if (isSidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-black/40 lg:hidden" (click)="closeSidebar()"></div>

    <div class="fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-xl lg:hidden">
      <app-sidebar (closeRequested)="closeSidebar()"></app-sidebar>
    </div>
  }

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-hidden lg:ml-64">
    <app-topbar class="shrink-0"
      [pageTitle]="currentTitle()"
      [unreadCount]="notificationStore.unreadCount()"
      (mobileMenuClicked)="openSidebar()">
    </app-topbar>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
