@if (isOpen()) {
  <div class="relative z-[100]" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Backdrop with fade animation -->
    <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity" (click)="cancelled.emit()"></div>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
        <!-- Modal panel with scale animation -->
        <div class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-md animate-in fade-in zoom-in-95 duration-200">

          <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
            <div class="sm:flex sm:items-start">
              <!-- Warning Icon -->
              <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
                <lucide-icon name="triangle-alert" class="h-6 w-6 text-fc-red"></lucide-icon>
              </div>

              <!-- Text Content -->
              <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                <h3 class="text-base font-semibold leading-6 text-gray-900" id="modal-title">
                  {{ title() }}
                </h3>
                <div class="mt-2">
                  <p class="text-sm text-gray-800 whitespace-pre-line">
                    {{ message() }}
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- Footer Buttons -->
          <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 gap-3">
            <button type="button"
                    (click)="confirmed.emit()"
                    class="inline-flex w-full justify-center rounded-lg bg-fc-red px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-fc-red-dark sm:w-auto transition-colors">
              {{ confirmText() }}
            </button>
            <button type="button"
                    (click)="cancelled.emit()"
                    class="mt-3 inline-flex w-full justify-center rounded-lg bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto transition-colors">
              {{ cancelText() }}
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
}
