@if (isOpen()) {
  <div class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    
    <!-- Background overlay -->
    <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity" (click)="closed.emit()"></div>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
      <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
        
        <!-- Modal Panel -->
        <div class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-md">
          
          <!-- Header -->
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gray-50/50">
            <h3 class="text-base font-semibold leading-6 text-gray-900" id="modal-title">
              {{ title() }}
            </h3>
            <button type="button" (click)="closed.emit()" class="text-gray-400 hover:text-gray-500 focus:outline-none">
              <lucide-icon name="x" class="h-5 w-5"></lucide-icon>
            </button>
          </div>

          <!-- Body (Injected Content) -->
          
            
              <div class="px-6 py-6">
                <ng-content></ng-content>
              </div>

        </div>
      </div>
    </div>
  </div>
}
