<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col h-full">
  <div class="flex-1 overflow-y-auto p-6 space-y-6">
    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom de la poissonnerie *</label>
      <input type="text" formControlName="name" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none" [ngClass]="{'border-fc-red': form.get('name')?.invalid && form.get('name')?.touched}">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label>
      <input type="text" formControlName="address" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
      <input type="text" formControlName="phone" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Loyer mensuel (FCFA)</label>
        <input type="number" formControlName="loyer" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fond de caisse (FCFA)</label>
        <input type="number" formControlName="fondDeCaisseDefaut" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none">
      </div>
    </div>

    <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-lg border border-gray-200">
      <input type="checkbox" formControlName="pretActif" id="pretActif" class="h-5 w-5 text-fc-green focus:ring-fc-green border-gray-300 rounded cursor-pointer">
      <label for="pretActif" class="text-sm font-medium text-gray-900 cursor-pointer">
        Autoriser les ventes à crédit (Dettes)
      </label>
    </div>

  </div>

  <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 shrink-0">
    <button type="button" (click)="cancel.emit()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
    <button type="submit" [disabled]="isLoading()" class="px-4 py-2 text-sm font-medium text-white bg-fc-green rounded-lg hover:bg-fc-green-dark flex items-center gap-2 disabled:opacity-50">
      @if (isLoading()) { <lucide-icon name="loader-circle" class="h-4 w-4 animate-spin"></lucide-icon> }
      Enregistrer
    </button>
  </div>
</form>
