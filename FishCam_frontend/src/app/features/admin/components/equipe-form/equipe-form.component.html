<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col h-full">
  <div class="flex-1 overflow-y-auto p-6 space-y-5">
    
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Prénom *</label>
        <input type="text" formControlName="firstName" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none" [ngClass]="{'border-fc-red': form.get('firstName')?.invalid && form.get('firstName')?.touched}">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom <span class="text-red-900">*</span></label>
        <input type="text" formControlName="lastName" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none" [ngClass]="{'border-fc-red': form.get('lastName')?.invalid && form.get('lastName')?.touched}">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone (Identifiant de connexion) <span class="text-red-900">*</span> </label>
      <div class="flex rounded-lg border border-gray-300 overflow-hidden focus-within:ring-2 focus-within:ring-fc-green transition-all" [ngClass]="{'border-fc-red focus-within:ring-fc-red': form.get('phone')?.invalid && form.get('phone')?.touched}">
        <div class="flex items-center bg-gray-50 px-3 border-r border-gray-300 text-gray-500 text-sm shrink-0">
          🇨🇲 <span class="ml-1 font-semibold">+237</span>
        </div>
        <input type="tel" formControlName="phone" placeholder="690123456" class="w-full px-3 py-2 outline-none text-gray-700">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Rôle <span class="text-red-900">*</span> </label>
        <select formControlName="role" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none bg-white">
          <option value="CAISSIERE">Caissière</option>
          <option value="ENREGISTREUR">Enregistreur</option>
          <option value="PATRON">Patron</option>
          <option value="SUPER_ADMIN">Super Admin</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Portée (Scope) <span class="text-red-900">*</span> </label>
        <select formControlName="scope" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none bg-white">
          <!-- <option value="SINGLE_POISSONNERIE">Une seule boutique</option> -->
          <option value="MULTI_POISSONNERIE">Toutes les boutiques</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Boutique par défaut</label>
      <select formControlName="defaultPoissonnerieId" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none bg-white">
        <option [ngValue]="null">Aucune / Globale</option>
        @for (p of poissonneries(); track p.id) {
          <option [ngValue]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>

    <!-- Le mot de passe n'est affiché qu'à la création -->
    @if (!userToEdit()) {
      <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe initial *</label>
        <input type="text" formControlName="password" placeholder="Minimum 6 caractères" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none" [ngClass]="{'border-fc-red': form.get('password')?.invalid && form.get('password')?.touched}">
        <p class="text-xs text-gray-500 mt-1">L'employé pourra le modifier plus tard.</p>
      </div>
    }

  </div>

  <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 shrink-0">
    <button type="button" (click)="cancel.emit()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Annuler</button>
    <button type="submit" [disabled]="isLoading() || form.invalid" class="px-4 py-2 text-sm font-medium text-white bg-fc-green rounded-lg hover:bg-fc-green-dark flex items-center gap-2 disabled:opacity-50">
      @if (isLoading()) { <lucide-icon name="loader-circle" class="h-4 w-4 animate-spin"></lucide-icon> }
      Enregistrer
    </button>
  </div>
</form>
