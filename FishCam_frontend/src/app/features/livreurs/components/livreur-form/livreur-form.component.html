<form [formGroup]="livreurForm" (ngSubmit)="onSubmit()" class="flex flex-col h-full">

  <div class="flex-1 overflow-y-auto space-y-5 pb-6 px-1">
    
    <!-- Fournisseur -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fournisseur <span class="text-red-500">*</span></label>
      <select formControlName="fournisseurId" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 bg-white">
        <option [ngValue]="null">Sélectionner un fournisseur...</option>
        @for (f of fournisseurs(); track f.id) {
          <option [ngValue]="f.id">{{ f.nom }}</option>
        }
      </select>
    </div>

    <!-- Nom -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom <span class="text-red-500">*</span></label>
      <input type="text" formControlName="nom" placeholder="Ex: Moussa"
             class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 transition-colors">
    </div>

    <!-- Prénom -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Prénom <span class="text-red-500">*</span></label>
      <input type="text" formControlName="prenom" placeholder="Ex: Ali"
             class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 transition-colors">
    </div>

    <!-- Téléphone -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone <span class="text-gray-400 font-normal">(Optionnel)</span></label>
      <div class="flex rounded-lg border border-gray-300 overflow-hidden focus-within:ring-2 focus-within:ring-fc-green transition-all">
        <div class="flex items-center bg-gray-50 px-3 border-r border-gray-300 text-gray-500 text-sm shrink-0">
          🇨🇲 <span class="ml-1 font-semibold">+237</span>
        </div>
        <input type="tel" formControlName="telephone" placeholder="690 123 456" class="w-full px-3 py-2 outline-none text-gray-700">
      </div>
    </div>

  </div>

  <!-- Footer Buttons -->
  <div class="pt-4 border-t border-gray-200 flex justify-end gap-3 mt-auto">
    <button type="button" (click)="cancel.emit()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
      Annuler
    </button>
    <button type="submit"
            [disabled]="isLoading() || livreurForm.invalid"
            class="px-4 py-2 text-sm font-medium text-white bg-fc-green rounded-lg hover:bg-fc-green-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
      @if (isLoading()) {
        <lucide-icon name="loader-circle" class="h-4 w-4 animate-spin inline mr-2"></lucide-icon>
        Enregistrement...
      } @else {
        Créer le livreur
      }
    </button>
  </div>
</form>
