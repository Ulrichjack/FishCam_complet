<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 h-full flex flex-col">

  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-semibold text-gray-800">Notifications récentes</h3>
    <a routerLink="/notifications" class="text-xs text-fc-green hover:underline font-medium">Voir tout →</a>
  </div>

  <!-- The List -->
  <div class="space-y-3 grow">

    @for(notification of store.preview(); track notification.id) {
  <div class="flex items-start gap-3 rounded-lg border border-gray-200 bg-white px-4 py-3 hover:bg-gray-50">

    <!-- Unread indicator -->
    <div class="mt-1.5 h-2 w-2 rounded-full shrink-0"
         [class.bg-emerald-600]="!notification.read"
         [class.bg-transparent]="notification.read">
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-3">
        <span class="text-xs font-semibold uppercase tracking-wide"
              [class]="getColorForType(notification.type)">
          {{ notification.type }}
        </span>
        <span class="text-xs text-gray-500 whitespace-nowrap">
          {{ notification.createdAt | date: 'dd/MM/yyyy HH:mm' }}
        </span>
      </div>

      <p class="mt-1 text-sm text-gray-900 whitespace-pre-line line-clamp-3">
        {{ notification.message }}
      </p>
    </div>

  </div>
}

    <!-- Empty State -->
    @if (store.preview().length === 0) {
      <div class="text-center py-6 text-gray-400 h-full flex flex-col justify-center items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto mb-2 opacity-50" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <p class="text-sm">Aucune nouvelle notification</p>
      </div>
    }

  </div>
</div>
