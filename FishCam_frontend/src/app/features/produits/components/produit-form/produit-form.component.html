<form [formGroup]="produitForm" (ngSubmit)="onSubmit()" class="flex flex-col h-full">

  <div class="flex-1 overflow-y-auto space-y-5 pb-6 px-1">
    <!-- Nom du produit -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom du produit <span class="text-red-500">*</span></label>
      <input type="text" formControlName="nom" placeholder="Ex: Carpe"
             class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 transition-colors">
    </div>

    <!-- Unité -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Unité <span class="text-red-500">*</span></label>
      <select formControlName="unite" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 bg-white">
        <option value="KG">Kilogramme (KG)</option>
      </select>
    </div>

    <!-- Poids par carton -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Poids par carton (Kg) <span class="text-red-500">*</span></label>
      <input type="number" step="0.1" formControlName="poidsParCarton" placeholder="Ex: 20"
             class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-fc-green outline-none text-gray-700 transition-colors">
    </div>
  </div>

  <!-- Footer Buttons -->
  <div class="pt-4 border-t border-gray-200 flex justify-end gap-3 mt-auto">
    <button type="button" (click)="cancel.emit()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
      Annuler
    </button>
    <button type="submit"
            [disabled]="isLoading() || produitForm.invalid"
            class="px-4 py-2 text-sm font-medium text-white bg-fc-green rounded-lg hover:bg-fc-green-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
      @if (isLoading()) {
        <lucide-icon name="loader-circle" class="h-4 w-4 animate-spin inline mr-2"></lucide-icon>
        Enregistrement...
      } @else {
        {{ produitToEdit() ? 'Modifier' : 'Créer le produit' }}
      }
    </button>
  </div>
</form>
